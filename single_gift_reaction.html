<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>単発ギフト リアクション オーバーレイ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --pink:#ff8fc7; --pink2:#ff5fa8; --purple:#a98cff; --mint:#7ef0d0;
    --gold:#ffd34d; --gold2:#ffb300; --ink:#3a2b45; --grey:#d9d3df;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{background:transparent; overflow:hidden;}
  body{
    font-family:'M PLUS Rounded 1c',sans-serif; -webkit-font-smoothing:antialiased;
    display:flex; align-items:center; justify-content:center; min-height:100vh; padding:12px; color:var(--ink);
  }

  /* ===== ひとつのパネル ===== */
  #card{
    position:relative; width:100%; max-width:560px;
    border-radius:22px; padding:12px 24px 14px;
    background:
      linear-gradient(180deg, rgba(255,255,255,.96), rgba(255,255,255,.88)),
      linear-gradient(135deg, var(--pink), var(--purple) 55%, var(--mint));
    background-clip:padding-box; border:4px solid #fff;
    box-shadow:0 8px 0 rgba(169,140,255,.28), 0 14px 32px rgba(120,80,160,.34), inset 0 0 0 3px rgba(255,143,199,.4);
    overflow:hidden;
  }
  #status{position:absolute; top:11px; right:13px; width:12px; height:12px; border-radius:50%; background:#cbc4d2; border:2px solid #fff; box-shadow:0 1px 3px rgba(0,0,0,.25); transition:.3s; z-index:3;}
  #status.on{background:#27d080; box-shadow:0 0 8px rgba(39,208,128,.85);}
  #status.err{background:#ff5b6e;}

  .titlebar{display:flex; align-items:center; gap:7px; margin-bottom:6px; padding-left:2px;}
  #title{font-weight:900; font-size:16px; letter-spacing:.3px; transition:opacity .2s;
    background:linear-gradient(180deg,var(--pink2),var(--purple)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;}
  .titlebar .spark{font-size:15px; animation:twinkle 2.6s ease-in-out infinite;}
  @keyframes twinkle{0%,100%{opacity:.5; transform:scale(.9)}50%{opacity:1; transform:scale(1.15)}}
  #langTag{margin-left:auto; font-size:11px; font-weight:900; color:#fff; background:linear-gradient(135deg,var(--purple),var(--pink2)); padding:1px 9px; border-radius:999px; letter-spacing:1px; box-shadow:0 2px 0 rgba(120,80,160,.3);}

  /* フリップ表示エリア（数字とリアクションを大きく） */
  #flipWrap{perspective:900px;}
  #flip{display:flex; flex-direction:column; align-items:center; gap:2px; transform-origin:top center; will-change:transform,opacity; padding:6px 0 2px;}
  #flip.go{animation:flip .5s cubic-bezier(.2,.72,.28,1);}
  @keyframes flip{0%{transform:rotateX(-90deg); opacity:0}55%{opacity:.4}100%{transform:rotateX(0); opacity:1}}

  .thresh{display:flex; align-items:baseline; justify-content:center; gap:6px; line-height:1;}
  #thNum{font-size:58px; font-weight:900; letter-spacing:-1.5px;
    background:linear-gradient(180deg,var(--gold),var(--gold2)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
    text-shadow:0 3px 0 rgba(217,152,0,.18);}
  #thSuf{font-size:26px; font-weight:900; color:#8a6fb0;}
  #arrow{font-size:18px; color:#c9a7e6; margin:-2px 0 0;}
  #react{font-size:34px; font-weight:900; text-align:center; line-height:1.12; color:#7a4a9a;
    overflow-wrap:anywhere; word-break:break-word;}

  #dots{display:flex; gap:7px; justify-content:center; margin-top:9px;}
  .dot{width:9px; height:9px; border-radius:50%; background:rgba(120,80,160,.25); transition:.3s;}
  .dot.on{background:linear-gradient(135deg,var(--pink2),var(--purple)); box-shadow:0 0 7px rgba(255,95,168,.5); transform:scale(1.15);}

  /* ===== 設定パネル ===== */
  #gear{position:fixed; top:8px; right:10px; width:34px; height:34px; border-radius:50%; background:rgba(255,255,255,.85); border:none; cursor:pointer; font-size:18px; opacity:.25; transition:.2s; z-index:60;}
  #gear:hover{opacity:1; transform:rotate(40deg)}
  #panel{position:fixed; top:0; right:0; height:100vh; width:330px; background:#fff; color:#333; box-shadow:-8px 0 30px rgba(0,0,0,.25); transform:translateX(105%); transition:.3s; z-index:61; padding:16px; overflow:auto; font-size:14px;}
  #panel.open{transform:translateX(0)}
  #panel h3{font-size:15px; margin:14px 0 4px; color:#a14a86; border-top:1px dashed #eadcf5; padding-top:12px} #panel h3:first-child{border:0;padding-top:0;margin-top:0}
  #panel p.note{font-size:11.5px; color:#888; margin-bottom:8px; line-height:1.5}
  #panel label{display:block; font-weight:800; margin:8px 0 3px; color:#6a4a8a}
  #panel input[type=text],#panel input[type=number],#panel textarea{width:100%; padding:8px 10px; border:2px solid #e3d7f5; border-radius:10px; font-size:14px; font-family:inherit; background:#fff; color:#333;}
  #panel textarea{height:110px; resize:vertical; line-height:1.5; font-size:12.5px;}
  #panel .sw{display:flex; align-items:center; gap:8px; margin:6px 0; font-weight:800; color:#6a4a8a}
  #panel button.apply{width:100%; margin-top:12px; padding:11px; border:none; border-radius:12px; background:linear-gradient(135deg,#a98cff,#ff5fa8); color:#fff; font-weight:900; font-size:15px; cursor:pointer; font-family:inherit;}
  #panel .mini{display:flex; gap:6px; margin-top:8px; flex-wrap:wrap}
  #panel .mini button{flex:1; min-width:62px; padding:8px 4px; border:2px solid #e3d7f5; background:#faf7ff; border-radius:9px; cursor:pointer; font-weight:800; font-size:12px; font-family:inherit; color:#6a4a8a}
  #urlOut{margin-top:10px; font-size:10.5px; word-break:break-all; background:#f6f2fb; padding:8px; border-radius:8px; color:#777}
  #wsState{font-size:12px; font-weight:800; margin-top:6px}
</style>
</head>
<body>

<div id="card">
  <span id="status"></span>
  <div class="titlebar">
    <span class="spark">✨</span>
    <span id="title">単発ギフト リアクション</span>
    <span id="langTag">JP</span>
  </div>
  <div id="flipWrap">
    <div id="flip">
      <div class="thresh"><span id="thNum">100</span><span id="thSuf">以上</span></div>
      <div id="arrow">▼</div>
      <div id="react">指ハート</div>
    </div>
  </div>
  <div id="dots"></div>
</div>

<button id="gear" title="設定">⚙️</button>
<div id="panel">
  <h3>① タイトル（日英）</h3>
  <label>日本語タイトル</label><input type="text" id="i_title_ja" value="単発ギフト リアクション">
  <label>English title</label><input type="text" id="i_title_en" value="Single-Gift Reactions">

  <h3>② リアクション項目</h3>
  <p class="note">1行＝「コイン | 日本語 | English」（| 区切り）。コイン数は「◯◯以上」の判定。1枚パネルがフリップで順に切り替わり、1周ごとに日英が入れ替わります。</p>
  <label>項目（コイン | 日本語 | English）</label>
  <textarea id="i_items">100 | 指ハート | Finger heart
500 | ハンドハートポーズ | Hand heart pose
1000 | 投げキッス | Blow a kiss</textarea>
  <label>フリップ間隔（秒）</label><input type="number" id="i_flipsec" value="4" min="1" step="0.5">
  <div class="sw"><input type="checkbox" id="i_langswitch" checked> 1周ごとに日英を切り替える</div>

  <button class="apply" id="applyBtn">反映する</button>
  <div class="mini">
    <button id="nextBtn">⏭ 次へ</button>
    <button id="langBtn">🌐 日英切替</button>
    <button id="copyBtn">🔗 URLコピー</button>
  </div>
  <div id="wsState">接続: ―</div>
  <div id="urlOut"></div>
</div>

<script>
(function(){
  "use strict";
  var $ = function(id){ return document.getElementById(id); };

  var DEFAULT_TITLE = {ja:'単発ギフト リアクション', en:'Single-Gift Reactions'};
  var DEFAULT_ITEMS = [
    {v:100,  ja:'指ハート',          en:'Finger heart'},
    {v:500,  ja:'ハンドハートポーズ', en:'Hand heart pose'},
    {v:1000, ja:'投げキッス',         en:'Blow a kiss'}
  ];

  var state = {
    title: {ja:DEFAULT_TITLE.ja, en:DEFAULT_TITLE.en},
    items: DEFAULT_ITEMS.map(function(m){ return {v:m.v,ja:m.ja,en:m.en}; }),
    lang:'ja', langSwitch:true, flipSec:4
  };
  var idx=0, timer=null;

  function fmt(n){ return Math.round(n).toLocaleString('ja-JP'); }
  function reactOf(m){ return state.lang==='en' ? (m.en||m.ja||'') : (m.ja||m.en||''); }
  function sufOf(){ return state.lang==='en' ? '+' : '以上'; }
  function titleOf(){ return state.lang==='en' ? (state.title.en||state.title.ja||'') : (state.title.ja||state.title.en||''); }

  // "コイン | 日本語 | English"
  function parseItems(text){
    var out=[];
    (text||'').split(/\n+/).forEach(function(line){
      line=line.trim(); if(!line) return;
      var p = line.split('|');
      var v=parseInt((p[0]||'').replace(/[^0-9]/g,''),10);
      if(!(v>0)) return;
      out.push({v:v, ja:(p[1]||'').trim(), en:(p[2]||'').trim()});
    });
    out.sort(function(a,b){return a.v-b.v;});
    return out;
  }
  function itemsToText(items){ return items.map(function(m){ return m.v+' | '+(m.ja||'')+' | '+(m.en||''); }).join('\n'); }

  function buildDots(){
    var d=$('dots'); d.innerHTML='';
    state.items.forEach(function(){ var s=document.createElement('span'); s.className='dot'; d.appendChild(s); });
  }
  function showCurrent(){
    if(idx>=state.items.length) idx=0;
    var m=state.items[idx]; if(!m){ return; }
    $('title').textContent=titleOf();
    $('thNum').textContent=fmt(m.v);
    $('thSuf').textContent=sufOf();
    $('react').textContent=reactOf(m);
    $('langTag').textContent = state.lang==='en' ? 'EN' : 'JP';
    var dots=$('dots').children;
    for(var i=0;i<dots.length;i++) dots[i].classList.toggle('on', i===idx);
  }
  function doFlip(){ var el=$('flip'); el.classList.remove('go'); void el.offsetWidth; el.classList.add('go'); }
  function advance(){
    if(state.items.length===0) return;
    idx++;
    if(idx>=state.items.length){ idx=0; if(state.langSwitch) state.lang = state.lang==='ja'?'en':'ja'; }
    showCurrent(); doFlip();
  }
  function startTimer(){
    clearInterval(timer);
    var ms=Math.max(1000, (state.flipSec||4)*1000);
    timer=setInterval(advance, ms);
  }
  function rebuild(resetIdx){
    if(resetIdx) idx=0;
    buildDots(); showCurrent(); startTimer();
  }

  /* 操作パネル中継(ws_server.py:21214) */
  var pws=null, pretry=null;
  function setWs(t){ $('wsState').textContent='接続: '+t; var s=$('status'); s.className = t==='OK'?'on':'err'; }
  function connectPanel(){
    try{ if(pws){ pws.onclose=null; pws.close(); } }catch(e){}
    try{ pws=new WebSocket('ws://localhost:21214/'); }catch(e){ setWs('×'); return; }
    pws.onopen=function(){ setWs('OK'); };
    pws.onmessage=function(ev){
      var m; try{ m=JSON.parse(ev.data); }catch(e){ return; }
      var nm=((m.event||'')+'').toLowerCase();
      if(nm==='reacttitle'){ if(m.ja!=null) state.title.ja=String(m.ja); if(m.en!=null) state.title.en=String(m.en); showCurrent(); syncPanel(); }
      else if(nm==='reactlist'){
        var arr=null;
        if(m.items&&m.items.length) arr=m.items.map(function(x){ return {v:Number(x.v)||0, ja:String(x.ja||''), en:String(x.en||'')}; });
        else if(m.text) arr=parseItems(m.text);
        if(arr&&arr.length){ arr.sort(function(a,b){return a.v-b.v;}); state.items=arr; rebuild(true); syncPanel(); }
      }
    };
    pws.onclose=function(){ setWs('切断'); clearTimeout(pretry); pretry=setTimeout(connectPanel,4000); };
    pws.onerror=function(){ try{ pws.close(); }catch(e){} };
  }

  window.SGR={
    setItems:function(arr){ if(arr&&arr.length){ state.items=arr.slice().sort(function(a,b){return a.v-b.v;}); rebuild(true); } },
    setTitle:function(ja,en){ if(ja!=null) state.title.ja=ja; if(en!=null) state.title.en=en; showCurrent(); },
    next:advance
  };

  /* URL / パネル */
  function fromURL(){
    var p=new URLSearchParams(location.search);
    if(p.has('title')){ try{ var t=JSON.parse(decodeURIComponent(p.get('title'))); if(t&&(t.ja||t.en)) state.title=t; }catch(e){} }
    if(p.has('items')){ try{ var a=JSON.parse(decodeURIComponent(p.get('items'))); if(a.length) state.items=a; }catch(e){} }
    if(p.has('langsw')) state.langSwitch=p.get('langsw')!=='0';
    if(p.has('lang')) state.lang=p.get('lang')==='en'?'en':'ja';
    if(p.has('flipsec')) state.flipSec=Number(p.get('flipsec'))||4;
  }
  function toURL(){
    var p=new URLSearchParams();
    p.set('title',encodeURIComponent(JSON.stringify(state.title)));
    p.set('items',encodeURIComponent(JSON.stringify(state.items)));
    p.set('langsw',state.langSwitch?1:0);
    p.set('flipsec',state.flipSec);
    return location.origin+location.pathname+'?'+p.toString();
  }
  function syncPanel(){
    $('i_title_ja').value=state.title.ja; $('i_title_en').value=state.title.en;
    $('i_items').value=itemsToText(state.items);
    $('i_flipsec').value=state.flipSec;
    $('i_langswitch').checked=state.langSwitch;
    $('urlOut').textContent=toURL();
  }

  $('gear').onclick=function(){ $('panel').classList.toggle('open'); };
  $('applyBtn').onclick=function(){
    state.title.ja=$('i_title_ja').value||DEFAULT_TITLE.ja;
    state.title.en=$('i_title_en').value||DEFAULT_TITLE.en;
    var ni=parseItems($('i_items').value); if(ni.length) state.items=ni;
    state.flipSec=Number($('i_flipsec').value)||4;
    state.langSwitch=$('i_langswitch').checked;
    rebuild(true); syncPanel();
  };
  $('nextBtn').onclick=advance;
  $('langBtn').onclick=function(){ state.lang = state.lang==='ja'?'en':'ja'; showCurrent(); };
  $('copyBtn').onclick=function(){ if(navigator.clipboard) navigator.clipboard.writeText(toURL()); $('copyBtn').textContent='✓ コピー済'; setTimeout(function(){ $('copyBtn').textContent='🔗 URLコピー'; },1500); };

  // 初期化
  fromURL(); syncPanel(); rebuild(true); connectPanel();
})();
</script>
</body>
</html>
