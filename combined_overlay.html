<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: transparent; font-family: 'M PLUS Rounded 1c', sans-serif; width: 420px; padding: 6px; overflow: hidden; }

  /* ===== ヘッダー ===== */
  .header { display: flex; align-items: center; justify-content: center; padding: 4px 12px; margin-bottom: 2px; background: #000; border: 1px solid #ff007f; border-radius: 8px; height: 48px; box-shadow: 0 0 12px #ff007f55; overflow: hidden; position: relative; }
  .marquee-wrap { flex: 1; overflow: visible; height: 100%; position: relative; display: flex; align-items: center; justify-content: center; min-width: 0; }
  .marquee-line { display: flex; align-items: center; gap: 4px; height: 100%; flex-wrap: nowrap; }
  .marquee-char {
    display: inline-block;
    font-size: 15px;
    font-weight: 900;
    letter-spacing: 1.5px;
    line-height: 1;
    text-shadow: 0 0 6px currentColor;
    opacity: 0;
    transform: translateY(10px) scale(0.5);
    animation: charPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }
  @keyframes charPop {
    0%   { opacity: 0; transform: translateY(10px) scale(0.5) rotate(-8deg); }
    60%  { opacity: 1; transform: translateY(0) scale(1.05) rotate(3deg); }
    100% { opacity: 1; transform: translateY(0) scale(1) rotate(0); }
  }
  .header::after { content: ""; position: absolute; left: 0; right: 0; top: 0; height: 2px; background: linear-gradient(90deg, transparent, #ff007f88, transparent); animation: scan 2.5s linear infinite; pointer-events: none; }
  @keyframes scan { from{top:0} to{top:48px} }

  /* ===== 進行度メーター(ヘッダー下・独立行) ===== */
  .progress-row {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 6px; padding: 6px 10px;
    background: linear-gradient(90deg, rgba(22,0,13,0.85), rgba(44,0,26,0.7), rgba(22,0,13,0.85));
    border: 1px solid #ff007f44;
    border-radius: 8px;
    box-shadow: 0 0 6px #ff007f22 inset;
  }
  .progress-label {
    font-size: 13px; font-weight: 900;
    color: #ff007f;
    text-shadow: 0 0 4px #ff007f88;
    letter-spacing: 1px;
    flex-shrink: 0;
    min-width: 70px;
  }
  .progress-bar-bg {
    flex: 1; height: 12px;
    background: #ffffff10;
    border: 1px solid #ffffff15;
    border-radius: 6px;
    overflow: hidden;
    position: relative;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #ff007f, #baff29, #baff29);
    border-radius: 6px;
    transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
    box-shadow: 0 0 6px #ff007faa;
    position: relative;
  }
  .progress-bar-fill::after {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
    animation: shine 2.5s linear infinite;
  }
  @keyframes shine { from{transform:translateX(-100%)} to{transform:translateX(200%)} }
  .progress-percent {
    font-size: 12px; font-weight: 900;
    color: #baff29;
    text-shadow: 0 0 4px #baff2988;
    flex-shrink: 0;
    min-width: 36px;
    text-align: right;
  }

  /* ===== メインレイアウト ===== */
  .main-row { display: flex; gap: 6px; align-items: flex-start; }
  .sidebar { width: 140px; flex-shrink: 0; }
  .like-section { background: linear-gradient(135deg, rgba(0,0,0,0.85), rgba(22,0,13,0.9)); border: 1px solid #ff007f33; border-radius: 10px; padding: 7px 8px; }
  .section-title { font-size: 10px; font-weight: 900; letter-spacing: 1px; margin-bottom: 5px; padding-bottom: 3px; border-bottom: 1px solid #ffffff22; }
  .section-title.magenta { text-shadow: 0 0 4px #baff29; color: #baff29; }
  .like-total { font-size: 9px; font-weight: 700; color: #baff2988; margin-bottom: 5px; padding-bottom: 3px; border-bottom: 1px solid #ffffff22; text-align: right; }
  .like-row { display: flex; align-items: center; gap: 4px; padding: 3px 0; }
  .like-rank { font-size: 11px; min-width: 18px; text-align: center; font-weight: 900; flex-shrink: 0; }
  .like-row.top1 .like-rank { color: #baff29; text-shadow: 0 0 6px #baff29; }
  .like-row.top2 .like-rank { color: #c0c0c0; text-shadow: 0 0 4px #c0c0c0; }
  .like-row.top3 .like-rank { color: #cd7f32; text-shadow: 0 0 4px #cd7f32; }
  .like-row.other .like-rank { color: #ffffff44; font-size: 9px; }
  .like-avatar { width: 18px; height: 18px; border-radius: 50%; flex-shrink: 0; background: #ffffff10; border: 1px solid #ffffff22; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 900; color: #ffffff66; }
  .like-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .like-row.top1 .like-avatar { border-color: #baff2988; box-shadow: 0 0 4px #baff2966; }
  .like-row.top2 .like-avatar { border-color: #c0c0c088; }
  .like-row.top3 .like-avatar { border-color: #cd7f3288; }
  .like-name { flex: 1; font-size: 10px; font-weight: 800; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
  .like-count { font-size: 10px; font-weight: 900; color: #baff29; min-width: 22px; text-align: right; flex-shrink: 0; }
  .like-row.top1 .like-count { color: #baff29; }

  /* ===== ギフトグリッド ===== */
  .grid-wrap { flex: 1; position: relative; }
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px; }
  .gift-card { position: relative; background: linear-gradient(160deg, rgba(0,0,0,0.8), rgba(12,0,8,0.85)); border: 1px solid #ffffff15; border-radius: 8px; padding: 7px 4px 5px; text-align: center; overflow: hidden; }
  .gift-card.lit { border-color: #baff29; background: linear-gradient(160deg, rgba(0,22,8,0.9), rgba(0,40,16,0.85)); animation: litPulse 3s ease-in-out infinite; }
  @keyframes litPulse { 0%,100%{box-shadow:0 0 6px #baff2955} 50%{box-shadow:0 0 12px #baff2988} }
  .gift-card.just-lit { animation: litBurst 0.6s ease forwards, litPulse 3s 0.6s infinite; }
  @keyframes litBurst { 0%{transform:scale(1)} 40%{transform:scale(1.12);box-shadow:0 0 20px #baff29} 100%{transform:scale(1)} }
  .lit-star { position: absolute; top: 2px; right: 2px; font-size: 9px; animation: starSpin 2s linear infinite; }
  @keyframes starSpin { from{transform:rotate(0)} to{transform:rotate(360deg)} }
  .gift-img-wrap { width: 42px; height: 42px; margin: 0 auto 3px; position: relative; }
  .gift-img { width: 42px; height: 42px; object-fit: contain; display: block; border-radius: 6px; }
  .gift-card:not(.lit) .gift-img { filter: grayscale(90%) brightness(0.45); }
  .gift-placeholder { width: 42px; height: 42px; border-radius: 6px; background: #ffffff08; border: 1px dashed #ffffff22; display: flex; align-items: center; justify-content: center; font-size: 18px; line-height: 1; }
  .gift-card:not(.lit) .gift-placeholder { opacity: 0.3; }
  .gift-name { font-size: 9px; font-weight: 800; color: #baff29; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .gift-card:not(.lit) .gift-name { color: #baff2966; }
  .progress-wrap { width: 100%; height: 2px; background: #ffffff0f; border-radius: 2px; overflow: hidden; margin-bottom: 2px; }
  .progress-fill { height: 100%; background: linear-gradient(90deg,#ff007f,#baff29); border-radius: 2px; transition: width 0.6s ease; }
  .gift-card:not(.lit) .progress-fill { background: #ffffff22; }
  .gift-status { font-size: 8px; font-weight: 700; }
  .gift-card.lit .gift-status { color: #baff29; }
  .gift-card:not(.lit) .gift-status { color: #baff2966; }
  .empty-msg { color: #ffffff22; font-size: 10px; font-weight: 700; text-align: center; padding: 6px; }

  /* ===== スクロールコンテナ ===== */
  .scroll-outer {
    height: 352px;   /* 4行分 = 8枠を表示 */
    overflow: hidden;
    position: relative;
  }
  .scroll-inner {
    display: flex;
    flex-direction: column;
    gap: 0;
    will-change: transform;
  }

  /* ===== ハートパーティクル ===== */
  .particle-layer {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    overflow: visible;
    z-index: 100;
  }
  .heart-particle {
    position: absolute;
    pointer-events: none;
    transform: translate(-50%, -50%);
    will-change: transform, opacity;
    filter: drop-shadow(0 0 4px #ff007f77);
    animation: heartFly 1.2s ease-out forwards;
  }
  @keyframes heartFly {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.2) rotate(0deg); }
    15%  { opacity: 1; transform: translate(-50%, -50%) scale(1.3) rotate(12deg); }
    100% { opacity: 0; transform: translate(calc(-50% + var(--dx, 0px)), calc(-50% + var(--dy, -60px))) scale(0.7) rotate(40deg); }
  }
  /* ===== 切替タイマーバー(次のヘッダー切替までを表示) ===== */
  .switch-bar { height:4px; margin:0 2px 6px; background:rgba(255,255,255,0.10); border:1px solid #ffffff15; border-radius:3px; overflow:hidden; }
  .switch-bar-fill { height:100%; width:0%; background:linear-gradient(90deg,#ff007f,#baff29); box-shadow:0 0 6px rgba(186,255,41,0.45); }
</style>
</head>

  /*GIFTS_END*/
  const DEFAULT_MESSAGES = [
    { text: "ギフトギャラリー",   icon: "🎁", color: "#baff29" },
    { text: "いいねランキング",   icon: "❤️", color: "#baff29" },
    { text: "ありがとう！",       icon: "✨", color: "#baff29" }
  ];
  const MSG_INTERVAL_MS = 15000;

  const STORAGE_LIKES       = 'tikfinity_likes_v1';
  const STORAGE_AVATARS     = 'tikfinity_avatars_v1';
  const STORAGE_GIFTS       = 'tikfinity_gifts_v1';
  const STORAGE_GIFT_COUNT  = 'tikfinity_gift_count_v1';
  const STORAGE_MESSAGES    = 'tikfinity_header_messages_v1';

  var likeRanking  = {};
  var likeAvatars  = {};
  var giftState    = {};
  var giftCount    = {};   // giftName → 受信累計数
  var giftImageMap = {};   // giftName → CDN imageUrl
  var messages     = DEFAULT_MESSAGES.slice();
  var currentMsgIdx = 0;
  var msgTimer = null;
  SLOTS.forEach(function(s){ giftState[s.name] = false; giftCount[s.name] = 0; });

  function persistAll() {
    try {
      localStorage.setItem(STORAGE_LIKES,       JSON.stringify(likeRanking));
      localStorage.setItem(STORAGE_AVATARS,     JSON.stringify(likeAvatars));
      localStorage.setItem(STORAGE_GIFTS,       JSON.stringify(giftState));
      localStorage.setItem(STORAGE_GIFT_COUNT,  JSON.stringify(giftCount));
      localStorage.setItem(STORAGE_GIFT_IMAGES, JSON.stringify(giftImageMap));
    } catch (e) {}
  }
  function persistMessages() {
    try { localStorage.setItem(STORAGE_MESSAGES, JSON.stringify(messages)); } catch (e) {}
  }
  function loadAll() {
    try {
      const l = localStorage.getItem(STORAGE_LIKES);
      if (l) { const o = JSON.parse(l); if (o && typeof o === 'object') likeRanking = o; }
      const a = localStorage.getItem(STORAGE_AVATARS);
      if (a) { const o = JSON.parse(a); if (o && typeof o === 'object') likeAvatars = o; }
      const g = localStorage.getItem(STORAGE_GIFTS);
      if (g) {
        const parsed = JSON.parse(g) || {};
        Object.keys(parsed).forEach(function(k){
          if (giftState.hasOwnProperty(k)) giftState[k] = !!parsed[k];
        });
      }
      const gc = localStorage.getItem(STORAGE_GIFT_COUNT);
      if (gc) {
        const parsed = JSON.parse(gc) || {};
        Object.keys(parsed).forEach(function(k){
          if (giftCount.hasOwnProperty(k)) giftCount[k] = parseInt(parsed[k], 10) || 0;
        });
      }
      const m = localStorage.getItem(STORAGE_MESSAGES);
      if (m) {
        const arr = JSON.parse(m);
        if (Array.isArray(arr) && arr.length > 0) messages = arr;
      }
      const gi = localStorage.getItem(STORAGE_GIFT_IMAGES);
      if (gi) {
        const o = JSON.parse(gi);
        if (o && typeof o === 'object') giftImageMap = o;
      }
    } catch (e) {}
  }

  function extractAvatar(d) {
    if (!d) return null;
    if (d.user) {
      if (typeof d.user.profilePictureUrl === 'string') return d.user.profilePictureUrl;
      if (d.user.profilePicture) {
        if (typeof d.user.profilePicture === 'string') return d.user.profilePicture;
        if (d.user.profilePicture.urls && d.user.profilePicture.urls[0]) return d.user.profilePicture.urls[0];
        if (d.user.profilePicture.url_list && d.user.profilePicture.url_list[0]) return d.user.profilePicture.url_list[0];
      }
    }
    if (typeof d.profilePictureUrl === 'string') return d.profilePictureUrl;
    if (d.userDetails && d.userDetails.profilePictureUrls && d.userDetails.profilePictureUrls[0]) return d.userDetails.profilePictureUrls[0];
    return null;
  }

  function resetSwitchBar() {
    var f = document.getElementById('switchBarFill');
    if (!f) return;
    if (messages.length <= 1) { f.style.transition = 'none'; f.style.width = '0%'; return; }
    f.style.transition = 'none';
    f.style.width = '0%';
    void f.offsetWidth;
    f.style.transition = 'width ' + (MSG_INTERVAL_MS / 1000) + 's linear';
    f.style.width = '100%';
  }
  function showMessage(idx) {
    const wrap = document.getElementById('marqueeWrap');
    wrap.textContent = '';
    const msg = messages[idx];
    if (!msg) return;
    const line = document.createElement('div');
    line.className = 'marquee-line';
    line.style.color = msg.color || '#ffffff';
    // ヘッダー左の絵文字アイコンは表示しない(本文のみ中央表示)
    const text = String(msg.text || '');
    Array.from(text).forEach(function(c, i) {
      const charSpan = document.createElement('span');
      charSpan.className = 'marquee-char';
      charSpan.textContent = (c === ' ') ? ' ' : c;
      charSpan.style.animationDelay = (60 + i * 55) + 'ms';
      line.appendChild(charSpan);
    });
    wrap.appendChild(line);
    resetSwitchBar();
  }
  function nextMessage() {
    if (messages.length === 0) return;
    currentMsgIdx = (currentMsgIdx + 1) % messages.length;
    showMessage(currentMsgIdx);
  }
  function startMessageLoop() {
    if (msgTimer) { clearInterval(msgTimer); msgTimer = null; }
    if (messages.length === 0) return;
    if (currentMsgIdx >= messages.length) currentMsgIdx = 0;
    showMessage(currentMsgIdx);
    if (messages.length > 1) {
      msgTimer = setInterval(nextMessage, MSG_INTERVAL_MS);
    }
  }
  function applyNewMessages(newList) {
    if (!Array.isArray(newList)) return;
    messages = newList.length > 0 ? newList : DEFAULT_MESSAGES.slice();
    currentMsgIdx = 0;
    persistMessages();
    startMessageLoop();
  }

  const PARTICLE_EMOJIS = ['❤️','💖','💕','💗','💞','✨','⭐','🌟'];
  function spawnHearts(name) {
    const card = document.getElementById('card-' + name);
    const layer = document.getElementById('particleLayer');
    if (!card || !layer) return;
    const cardRect = card.getBoundingClientRect();
    const layerRect = layer.getBoundingClientRect();
    const cx = cardRect.left - layerRect.left + cardRect.width / 2;
    const cy = cardRect.top  - layerRect.top  + cardRect.height / 2;
    const COUNT = 14;
    for (let i = 0; i < COUNT; i++) {
      const p = document.createElement('div');
      p.className = 'heart-particle';
      p.textContent = PARTICLE_EMOJIS[Math.floor(Math.random() * PARTICLE_EMOJIS.length)];
      const angle = -Math.PI/2 + (Math.random() - 0.5) * (Math.PI * 0.85);
      const distance = 35 + Math.random() * 55;
      const dx = Math.cos(angle) * distance;
      const dy = Math.sin(angle) * distance;
      p.style.left = cx + 'px';
      p.style.top  = cy + 'px';
      p.style.setProperty('--dx', dx + 'px');
      p.style.setProperty('--dy', dy + 'px');
      p.style.fontSize = (10 + Math.random() * 9) + 'px';
      p.style.animationDuration = (1.0 + Math.random() * 0.6) + 's';
      p.style.animationDelay = (Math.random() * 0.15) + 's';
      layer.appendChild(p);
      setTimeout(function(){ if (p.parentNode) p.parentNode.removeChild(p); }, 1800);
    }
  }

  const grid = document.getElementById("grid");
  SLOTS.forEach(function(slot) {
    const emoji = GIFT_EMOJI[slot.name] || "🎁";
    const card = document.createElement("div");
    card.className = "gift-card";
    card.id = "card-" + slot.name;
    card.innerHTML =
      '<div class="lit-star" id="star-' + slot.name + '" style="display:none">✨</div>' +
      '<div class="gift-img-wrap">' +
        '<img class="gift-img" id="img-' + slot.name + '" src="' + (GIFT_IMG[slot.name]||LOCAL_IMG_BASE+slot.name+'.png')+'" alt="' + slot.name + '" onerror="this.style.display=\'none\';document.getElementById(\'ph-' + slot.name + '\').style.display=\'flex\'">' +
        '<div class="gift-placeholder" id="ph-' + slot.name + '" style="display:none;position:absolute;top:0;left:0;">' + emoji + '</div>' +
      '</div>' +
      '<div class="gift-name">' + slot.name + '</div>' +
      '<div class="progress-wrap"><div class="progress-fill" id="prog-' + slot.name + '" style="width:0%"></div></div>' +
      '<div class="gift-status" id="status-' + slot.name + '">未点灯</div>';
    grid.appendChild(card);
  });

  function _applyCardState(prefix, name, animate) {
    var p = prefix || '';
    const slot   = SLOTS.find(function(s){ return s.name === name; });
    const need   = slot ? slot.need : 1;
    const count  = giftCount[name] || 0;
    const lit    = giftState[name] || (count >= need);
    const pct    = need > 0 ? Math.min(100, Math.round(count / need * 100)) : 0;
    const card   = document.getElementById(p + "card-" + name);
    const star   = document.getElementById(p + "star-" + name);
    const prog   = document.getElementById(p + "prog-" + name);
    const status = document.getElementById(p + "status-" + name);
    if (!card) return;
    if (lit) {
      if (animate) {
        card.className = "gift-card just-lit";
        setTimeout(function(){ if (giftState[name] || (giftCount[name]||0) >= need) card.className = "gift-card lit"; }, 650);
      } else {
        card.className = "gift-card lit";
      }
      if (star)   star.style.display   = "block";
      if (prog)   prog.style.width     = "100%";
      if (status) status.textContent   = count + "/" + need + " ✅";
    } else {
      card.className = "gift-card";
      if (star)   star.style.display   = "none";
      if (prog)   prog.style.width     = pct + "%";
      if (status) status.textContent   = count + "/" + need;
    }
  }
  function updateCard(name, animate) {
    _applyCardState('',    name, animate); // オリジナル
    _applyCardState('c_', name, false);   // クローン（アニメなし）
  }

  function updateHeader() {
    const litCount = Object.values(giftState).filter(function(v){return v;}).length;
    const pct = Math.round(litCount / SLOTS.length * 100);
    document.getElementById("progressText").textContent = litCount + "/" + SLOTS.length + " 点灯";
    document.getElementById("headerBar").style.width = pct + "%";
    const pe = document.getElementById("progressPercent");
    if (pe) pe.textContent = pct + "%";
  }

  // CDN画像URLをスロットに適用する
  function updateGiftImage(name, url) {
    if (!name || !url) return;
    giftImageMap[name] = url;
    var img = document.getElementById('img-' + name);
    var ph  = document.getElementById('ph-' + name);
    if (img) {
      img.src = url;
      img.style.display = 'block';
      img.onerror = null; // CDN画像はエラー処理を解除
    }
    if (ph) ph.style.display = 'none';
    try { localStorage.setItem(STORAGE_GIFT_IMAGES, JSON.stringify(giftImageMap)); } catch(e) {}
  }

  function lightUp(name) {
    if (!giftState.hasOwnProperty(name) || giftState[name]) return;
    giftState[name] = true;
    updateCard(name, true);
    spawnHearts(name);
    updateHeader();
    persistAll();
  }
  function lightOff(name) {
    if (!giftState.hasOwnProperty(name)) return;
    giftState[name] = false;
    updateCard(name, false);
    updateHeader();
    persistAll();
  }
  function resetAll() {
    SLOTS.forEach(function(s){
      giftState[s.name] = false;
      giftCount[s.name] = 0;
      updateCard(s.name, false);
    });
    updateHeader();
    persistAll();
  }

  function renderLikes() {
    const sorted = Object.entries(likeRanking).sort(function(a,b){return b[1]-a[1];}).slice(0,5);
    const total  = Object.values(likeRanking).reduce(function(s,v){return s+v;}, 0);
    const rl = ["🥇","🥈","🥉","4","5"];
    const rc = ["top1","top2","top3","other","other"];
    document.getElementById("totalLikes").textContent = "合計: " + total.toLocaleString();
    const list = document.getElementById("rankingList");
    list.textContent = "";
    if (sorted.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty-msg';
      empty.textContent = 'まだいいねなし';
      list.appendChild(empty);
      return;
    }
    sorted.forEach(function(entry, i) {
      const user  = entry[0];
      const count = entry[1];
      const row = document.createElement('div');
      row.className = 'like-row ' + rc[i];

      const rank = document.createElement('div');
      rank.className = 'like-rank';
      rank.textContent = rl[i];

      const avatar = document.createElement('div');
      avatar.className = 'like-avatar';
      const url = likeAvatars[user];
      if (url) {
        const img = document.createElement('img');
        img.src = url;
        img.alt = '';
        img.onerror = function() {
          if (img.parentNode === avatar) avatar.removeChild(img);
          avatar.textContent = (user || '?').charAt(0).toUpperCase();
        };
        avatar.appendChild(img);
      } else {
        avatar.textContent = (user || '?').charAt(0).toUpperCase();
      }

      const nm = document.createElement('div');
      nm.className = 'like-name';
      nm.textContent = user;

      const cnt = document.createElement('div');
      cnt.className = 'like-count';
      cnt.textContent = count.toLocaleString() + '❤️';

      row.appendChild(rank);
      row.appendChild(avatar);
      row.appendChild(nm);
      row.appendChild(cnt);
      list.appendChild(row);
    });
  }

  function handleMessage(msg) {
    if (msg.event === "like") {
      const d = msg.data || {};
      const user  = (d.user && d.user.uniqueId) || d.uniqueId || d.nickname || "不明";
      const count = d.likeCount || 1;
      likeRanking[user] = (likeRanking[user] || 0) + count;
      const av = extractAvatar(d);
      if (av) likeAvatars[user] = av;
      persistAll();
      renderLikes();
    }

    // TikFinity設定からギフト画像URLを先読みする
    if (msg.event === "config") {
      const evts = (msg.data && msg.data.events) || [];
      evts.forEach(function(ev) {
        const t = ev.trigger || {};
        if (t.type === "gift" && t.name && t.imageUrl) {
          updateGiftImage(t.name, t.imageUrl);
        }
      });
    }

    // ライブ中にギフトを受け取ったとき: 画像更新 + カウント加算 + 目標達成で自動点灯
    if (msg.event === "gift") {
      const d = msg.data || {};
      // ギフト名: 複数フィールド名に対応
      const giftName = d.giftName || d.name || d.gift_name || null;
      // 画像URL: 複数フィールド名に対応（不確定なため候補を列挙）
      const imageUrl =
        d.imageUrl ||
        d.giftImage ||
        d.image ||
        (d.extendedGiftInfo && d.extendedGiftInfo.image &&
         d.extendedGiftInfo.image.url_list && d.extendedGiftInfo.image.url_list[0]) ||
        null;
      if (giftName && imageUrl) {
        updateGiftImage(giftName, imageUrl);
      }
      // スロットに登録済みのギフトならカウント加算
      if (giftName && giftCount.hasOwnProperty(giftName)) {
        const inc = d.repeatCount || d.giftCount || d.count || 1;
        giftCount[giftName] = (giftCount[giftName] || 0) + inc;
        const slot = SLOTS.find(function(s){ return s.name === giftName; });
        const need = slot ? slot.need : 1;
        if (giftCount[giftName] >= need && !giftState[giftName]) {
          // 目標数達成 → 点灯（spawnHeartsも内部で発火）
          lightUp(giftName);
        } else {
          // まだ未達 → カード表示だけ更新
          updateCard(giftName, false);
          updateHeader();
          persistAll();
        }
      }
    }

    if (msg.event === "lightUp")  lightUp(msg.name);
    if (msg.event === "lightOff") lightOff(msg.name);
    if (msg.event === "resetAll") resetAll();
    if (msg.event === "resetLikes") {
      Object.keys(likeRanking).forEach(function(k){ delete likeRanking[k]; });
      Object.keys(likeAvatars).forEach(function(k){ delete likeAvatars[k]; });
      persistAll();
      renderLikes();
    }
    if (msg.event === "updateMessages") {
      applyNewMessages(msg.messages);
    }
  }
  // ===== 無限縦スクロール（クローンでシームレス） =====
  function initAutoScroll() {
    var grid  = document.getElementById('grid');
    var inner = document.getElementById('scrollInner');
    var outer = document.getElementById('scrollOuter');
    if (!grid || !inner || !outer) return;
    var clone = grid.cloneNode(true);
    var ided = clone.querySelectorAll('[id]');
    for (var i = 0; i < ided.length; i++) { ided[i].id = 'c_' + ided[i].id; }
    clone.id = 'c_grid';
    inner.style.gap = '4px';
    inner.appendChild(clone);
    var SPEED = 22; // px/秒
    function frame(ts) {
      var period = grid.offsetHeight + 4;
      if (grid.offsetHeight > outer.offsetHeight && period > 0) {
        var y = -(((ts || 0) / 1000 * SPEED) % period);
        inner.style.transform = 'translateY(' + y + 'px)';
      } else {
        inner.style.transform = 'translateY(0)';
      }
      if (typeof requestAnimationFrame === 'function') requestAnimationFrame(frame);
    }
    if (typeof requestAnimationFrame === 'function') requestAnimationFrame(frame);
  }

  // ===== WebSocket 接続（本番=21213 TikFinity / 操作パネル=21214 中継） =====
  function connect(url) {
    var ws;
    try { ws = new WebSocket(url); } catch (e) { setTimeout(function(){ connect(url); }, 3000); return; }
    ws.onmessage = function(e){ try { handleMessage(JSON.parse(e.data)); } catch (err) {} };
    ws.onclose   = function(){ setTimeout(function(){ connect(url); }, 3000); };
    ws.onerror   = function(){ try { ws.close(); } catch (e) {} };
  }

  // ===== 初期化 =====
  loadAll();
  try { Object.keys(giftImageMap).forEach(function(n){ if (giftImageMap[n]) updateGiftImage(n, giftImageMap[n]); }); } catch (e) {}
  SLOTS.forEach(function(s){ updateCard(s.name, false); });
  updateHeader();
  renderLikes();
  startMessageLoop();
  initAutoScroll();
  window.handleMessage = handleMessage;
  connect("ws://localhost:21213/");
  connect("ws://localhost:21214/");
</script>
