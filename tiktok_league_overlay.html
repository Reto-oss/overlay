<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok 欠片キープ オーバーレイ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --pink:#ff8fc7; --pink2:#ff5fa8; --purple:#a98cff; --mint:#7ef0d0;
    --gold:#ffd34d; --danger:#ff6b8a; --safe:#5fd0a8; --ink:#3a2b45;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{background:transparent; overflow:hidden;}
  body{
    font-family:'M PLUS Rounded 1c',sans-serif; -webkit-font-smoothing:antialiased;
    display:flex; align-items:center; justify-content:center; min-height:100vh; padding:18px; color:var(--ink);
  }
  #card{
    position:relative; width:640px; max-width:100%;
    border-radius:34px; padding:22px 26px 24px;
    background:
      linear-gradient(180deg, rgba(255,255,255,.96), rgba(255,255,255,.86)),
      linear-gradient(135deg, var(--pink), var(--purple) 55%, var(--mint));
    background-clip:padding-box; border:5px solid #fff;
    box-shadow:0 14px 0 rgba(169,140,255,.30), 0 22px 48px rgba(120,80,160,.40), inset 0 0 0 3px rgba(255,143,199,.45);
    animation:floaty 4.2s ease-in-out infinite;
  }
  @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
  .deco{position:absolute; font-size:26px; pointer-events:none; filter:drop-shadow(0 2px 2px rgba(0,0,0,.12)); animation:twinkle 2.6s ease-in-out infinite;}
  .deco.d1{top:-14px; left:24px; transform:rotate(-12deg)} .deco.d2{top:-18px; right:34px; animation-delay:.6s}
  .deco.d3{bottom:-12px; left:48px; animation-delay:1.1s; font-size:22px}
  @keyframes twinkle{0%,100%{opacity:.55; transform:scale(.9)}50%{opacity:1; transform:scale(1.15)}}
  #status{position:absolute; top:14px; right:18px; font-size:13px; font-weight:800; padding:3px 11px; border-radius:999px; background:rgba(255,255,255,.8); color:#8a6fb0; border:2px solid #fff;}
  #status.on{color:#1d9e75; background:rgba(126,240,208,.5)} #status.err{color:#c0392b; background:rgba(255,107,138,.35)}
  .top{display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:8px;}
  #leagueBadge{display:inline-flex; align-items:center; gap:8px; background:linear-gradient(135deg,var(--purple),var(--pink2)); color:#fff; font-weight:900; font-size:24px; letter-spacing:.5px; padding:6px 18px; border-radius:999px; border:3px solid #fff; box-shadow:0 4px 0 rgba(120,80,160,.35);}
  #fragRow{display:flex; align-items:center; justify-content:center; gap:5px; margin-bottom:10px;}
  .frag{font-size:22px; filter:grayscale(1) opacity(.35); transition:.3s} .frag.on{filter:none; animation:pop .4s ease}
  @keyframes pop{0%{transform:scale(.4)}70%{transform:scale(1.25)}100%{transform:scale(1)}}
  #shield{margin-left:6px; font-size:20px; opacity:.9}
  #headLabel{text-align:center; font-weight:800; font-size:23px; color:var(--ink); margin-top:2px;}
  #bigWrap{text-align:center; line-height:1; margin:2px 0 6px;}
  #ato{font-size:26px; font-weight:800; color:#8a6fb0; vertical-align:18px; margin-right:4px;}
  #bigNum{font-size:86px; font-weight:900; letter-spacing:-2px; background:linear-gradient(180deg,var(--pink2),var(--purple)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; text-shadow:0 5px 0 rgba(255,143,199,.18);}
  #unit{font-size:34px; font-weight:900; color:var(--gold); margin-left:6px; text-shadow:0 2px 0 #e0a800; vertical-align:14px;}
  #card.safe #bigNum{background:linear-gradient(180deg,#34c98a,#5fd0a8); -webkit-background-clip:text; background-clip:text;}
  #card.gain1 #bigNum,#card.gain2 #bigNum{background:linear-gradient(180deg,#ffb02e,#ff7eb3); -webkit-background-clip:text; background-clip:text;}
  #barOuter{position:relative; height:30px; border-radius:999px; background:rgba(120,80,160,.16); border:3px solid #fff; overflow:hidden; box-shadow:inset 0 2px 6px rgba(120,80,160,.25);}
  #barFill{height:100%; width:0%; border-radius:999px; background:linear-gradient(90deg,var(--pink),var(--pink2)); box-shadow:0 0 16px rgba(255,95,168,.6); transition:width .8s cubic-bezier(.22,1,.36,1); position:relative;}
  #card.safe #barFill{background:linear-gradient(90deg,#7ef0d0,#34c98a)}
  #card.gain1 #barFill,#card.gain2 #barFill{background:linear-gradient(90deg,#ffd34d,#ff7eb3)}
  #barFill::after{content:''; position:absolute; inset:0; background:repeating-linear-gradient(45deg,rgba(255,255,255,.35) 0 10px,transparent 10px 20px); animation:flow 1s linear infinite;}
  @keyframes flow{to{background-position:28px 0}}
  #barText{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:800; color:#fff; text-shadow:0 1px 2px rgba(0,0,0,.35);}
  .foot{display:flex; justify-content:space-between; align-items:center; margin-top:11px; gap:10px;}
  .pill{flex:1; text-align:center; background:rgba(255,255,255,.7); border:2.5px solid rgba(169,140,255,.45); border-radius:16px; padding:6px 8px;}
  .pill .k{font-size:12.5px; font-weight:800; color:#8a6fb0; display:block;}
  .pill .v{font-size:21px; font-weight:900; color:var(--ink);} .pill .v small{font-size:13px; color:var(--gold); font-weight:900;}
  #flash{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; border-radius:34px; background:linear-gradient(135deg,rgba(255,211,77,.95),rgba(255,143,199,.95)); color:#fff; font-size:40px; font-weight:900; text-shadow:0 3px 0 rgba(0,0,0,.18); opacity:0; pointer-events:none; transition:opacity .3s;}
  #flash.show{opacity:1; animation:flashPop .6s ease}
  @keyframes flashPop{0%{transform:scale(.6)}60%{transform:scale(1.08)}100%{transform:scale(1)}}
  .confetti{position:fixed; top:-20px; font-size:20px; pointer-events:none; z-index:50; animation:fall linear forwards;}
  @keyframes fall{to{transform:translateY(105vh) rotate(540deg); opacity:.2}}
  #gear{position:fixed; top:8px; right:10px; width:34px; height:34px; border-radius:50%; background:rgba(255,255,255,.85); border:none; cursor:pointer; font-size:18px; opacity:.25; transition:.2s; z-index:60;}
  #gear:hover{opacity:1; transform:rotate(40deg)}
  #panel{position:fixed; top:0; right:0; height:100vh; width:310px; background:#fff; color:#333; box-shadow:-8px 0 30px rgba(0,0,0,.25); transform:translateX(105%); transition:.3s; z-index:61; padding:16px; overflow:auto; font-size:14px;}
  #panel.open{transform:translateX(0)}
  #panel h3{font-size:15px; margin:14px 0 4px; color:#a14a86; border-top:1px dashed #eadcf5; padding-top:12px} #panel h3:first-child{border:0;padding-top:0;margin-top:0}
  #panel p.note{font-size:11.5px; color:#888; margin-bottom:8px; line-height:1.5}
  #panel label{display:block; font-weight:800; margin:8px 0 3px; color:#6a4a8a}
  #panel input[type=text],#panel input[type=number]{width:100%; padding:8px 10px; border:2px solid #e3d7f5; border-radius:10px; font-size:15px; font-family:inherit;}
  #panel .row2{display:flex; gap:8px} #panel .row2>div{flex:1}
  #panel .sw{display:flex; align-items:center; gap:8px; margin:6px 0; font-weight:800; color:#6a4a8a}
  #panel button.apply{width:100%; margin-top:14px; padding:11px; border:none; border-radius:12px; background:linear-gradient(135deg,#a98cff,#ff5fa8); color:#fff; font-weight:900; font-size:15px; cursor:pointer; font-family:inherit;}
  #panel .mini{display:flex; gap:6px; margin-top:8px; flex-wrap:wrap}
  #panel .mini button{flex:1; padding:7px; border:2px solid #e3d7f5; background:#faf7ff; border-radius:9px; cursor:pointer; font-weight:800; font-size:12px; font-family:inherit; color:#6a4a8a}
  #urlOut{margin-top:10px; font-size:10.5px; word-break:break-all; background:#f6f2fb; padding:8px; border-radius:8px; color:#777}
  #wsState{font-size:12px; font-weight:800; margin-top:6px}
</style>
</head>
<body>

<div id="card">
  <span class="deco d1">⭐</span><span class="deco d2">✨</span><span class="deco d3">💗</span>
  <span id="status">⚪ 手動</span>
  <div class="top"><span id="leagueBadge"><span>👑</span><span id="leagueName">C3</span> リーグ</span></div>
  <div id="fragRow">
    <span class="frag">🔶</span><span class="frag">🔶</span><span class="frag">🔶</span><span class="frag">🔶</span>
    <span id="shield">🛡️×0</span>
  </div>
  <div id="headLabel">欠片キープまで</div>
  <div id="bigWrap"><span id="ato">あと</span><span id="bigNum">0</span><span id="unit">💎</span></div>
  <div id="barOuter"><div id="barFill"></div><div id="barText">0%</div></div>
  <div class="foot">
    <div class="pill"><span class="k">現在</span><span class="v" id="curV">0<small>💎</small></span></div>
    <div class="pill"><span class="k">キープ</span><span class="v" id="keepV">0<small>💎</small></span></div>
    <div class="pill"><span class="k">+1 / +2</span><span class="v" id="upV">0 / 0</span></div>
  </div>
  <div id="flash">キープ達成🎉</div>
</div>

<button id="gear" title="設定">⚙️</button>
<div id="panel">
  <h3>① 基準ライン（手入力）</h3>
  <p class="note">アプリのライブ画面で見える数値。キープ＝欠片を失わないライン、+1/+2＝昇格かけら獲得ライン。ここは自動取得できないため必ず手入力。</p>
  <label>リーグ名</label><input type="text" id="i_league" value="C3">
  <div class="row2">
    <div><label>所持かけら(0-3)</label><input type="number" id="i_frag" value="2" min="0" max="3"></div>
    <div><label>シールド数</label><input type="number" id="i_shield" value="0" min="0" max="10"></div>
  </div>
  <label>キープライン 💎</label><input type="number" id="i_keep" value="50000">
  <div class="row2">
    <div><label>+1ライン 💎</label><input type="number" id="i_up1" value="80000"></div>
    <div><label>+2ライン 💎</label><input type="number" id="i_up2" value="120000"></div>
  </div>
  <h3>② 現在ダイヤ</h3>
  <div class="sw"><input type="checkbox" id="i_auto" checked> TikFinityから自動カウント</div>
  <p class="note">TikFinity Desktopアプリを起動＆ライブに接続しておくこと。配信中に飛んだギフトのダイヤを自動加算します。</p>
  <label>TikFinity WebSocket URL</label><input type="text" id="i_wsurl" value="ws://localhost:21213/">
  <label>開始ダイヤ（接続前に既に獲得済みの分）💎</label><input type="number" id="i_base" value="0">
  <label>手動の現在ダイヤ（自動OFF時に使用）💎</label><input type="number" id="i_current" value="12000">
  <div class="sw"><input type="checkbox" id="i_debug"> デバッグログ（F12コンソール）</div>
  <div id="wsState">接続: ―</div>
  <button class="apply" id="applyBtn">反映する</button>
  <div class="mini">
    <button id="reconnBtn">🔌 再接続</button>
    <button id="resetBtn">🔄 セッション0</button>
  </div>
  <div class="mini">
    <button id="demoBtn">▶ デモ加算</button>
    <button id="copyBtn">🔗 URLコピー</button>
  </div>
  <div id="urlOut"></div>
</div>

<script>
(function(){
  "use strict";
  var $ = function(id){ return document.getElementById(id); };
  var card = $('card');

  var state = {
    league:'C3', frag:2, shield:0,
    keep:50000, up1:80000, up2:120000,
    auto:true, wsUrl:'ws://localhost:21213/', base:0, manualCurrent:12000, debug:false,
    session:0
  };
  function current(){ return state.auto ? (state.base + state.session) : state.manualCurrent; }

  function remaining(c,t){ return Math.max(0, Math.round(t-c)); }
  function clampPct(c,t){ return t<=0 ? 100 : Math.max(0, Math.min(100,(c/t)*100)); }
  function headline(c){
    if(c < state.keep) return {label:'欠片キープまで', remain:remaining(c,state.keep), pct:clampPct(c,state.keep), st:'danger'};
    if(c < state.up1)  return {label:'+1かけらまで',  remain:remaining(c,state.up1),  pct:clampPct(c-state.keep,state.up1-state.keep), st:'safe'};
    if(c < state.up2)  return {label:'+2かけらまで',  remain:remaining(c,state.up2),  pct:clampPct(c-state.up1,state.up2-state.up1), st:'gain1'};
    return {label:'最上位帯キープ中！', remain:0, pct:100, st:'gain2'};
  }
  function fmt(n){ return Math.round(n).toLocaleString('ja-JP'); }

  var shown=0, raf=null;
  function tween(to){
    cancelAnimationFrame(raf); var from=shown, t0=performance.now(), dur=600;
    (function step(now){ var k=Math.min(1,(now-t0)/dur), e=1-Math.pow(1-k,3);
      shown=from+(to-from)*e; $('bigNum').textContent=fmt(shown);
      if(k<1) raf=requestAnimationFrame(step); else shown=to; })(t0);
  }

  var prevSt='danger';
  function render(){
    var c=current();
    $('leagueName').textContent=state.league;
    var fr=document.querySelectorAll('.frag');
    for(var i=0;i<fr.length;i++){ fr[i].classList.toggle('on', i<state.frag); }
    $('shield').textContent='🛡️×'+state.shield;
    var h=headline(c); card.className=h.st;
    $('headLabel').textContent=h.label;
    $('ato').style.display=h.remain>0?'':'none'; tween(h.remain);
    $('barFill').style.width=h.pct.toFixed(1)+'%'; $('barText').textContent=Math.round(h.pct)+'%';
    $('curV').innerHTML=fmt(c)+'<small>💎</small>';
    $('keepV').innerHTML=fmt(state.keep)+'<small>💎</small>';
    $('upV').textContent=fmt(state.up1)+' / '+fmt(state.up2);
    var ord={danger:0,safe:1,gain1:2,gain2:3};
    if(ord[h.st]>ord[prevSt]) celebrate(h.st); prevSt=h.st;
  }
  function celebrate(st){
    var f=$('flash'); f.textContent= st==='safe'?'欠片キープ達成🎉':st==='gain1'?'+1かけら獲得✨':st==='gain2'?'+2かけら✨最上位帯💎':'🎉';
    f.classList.add('show'); setTimeout(function(){ f.classList.remove('show'); },1900);
    var emo=['🎉','✨','💎','💗','⭐','🌸'];
    for(var i=0;i<46;i++){ var el=document.createElement('div'); el.className='confetti'; el.textContent=emo[i%emo.length];
      el.style.left=Math.random()*100+'vw'; el.style.fontSize=(14+Math.random()*16)+'px';
      el.style.animationDuration=(1.6+Math.random()*1.6)+'s'; el.style.animationDelay=(Math.random()*.4)+'s';
      document.body.appendChild(el); (function(x){ setTimeout(function(){ x.remove(); },3600); })(el); }
  }

  var ws=null, retry=null;
  function setStatus(kind,txt){ var s=$('status'); s.className=kind==='on'?'on':kind==='err'?'err':'';
    s.textContent=(kind==='on'?'🟢 ':kind==='err'?'🔴 ':kind==='wait'?'🟡 ':'⚪ ')+txt; $('wsState').textContent='接続: '+txt; }
  function dbg(){ if(state.debug) console.log.apply(console,['[TLO]'].concat([].slice.call(arguments))); }

  function diamondsOf(d){
    var cands=[d.diamondCount,d.diamond_count,d.diamondValue,
      d.giftDetails&&d.giftDetails.diamondCount, d.gift&&d.gift.diamond_count,
      d.extendedGiftInfo&&d.extendedGiftInfo.diamond_count];
    for(var i=0;i<cands.length;i++){ var v=cands[i]; if(typeof v==='number'&&v>0) return v; }
    return 0;
  }
  function handleGift(d){
    var giftType = (d.giftType!=null?d.giftType:(d.gift_type!=null?d.gift_type:(d.giftDetails&&d.giftDetails.giftType)));
    var repeatEnd = (d.repeatEnd!=null?d.repeatEnd:d.repeat_end);
    if(giftType===1 && repeatEnd===false){ dbg('streak in progress, skip'); return; }
    var per=diamondsOf(d); var rep=(d.repeatCount!=null?d.repeatCount:(d.repeat_count!=null?d.repeat_count:1));
    var add=per*rep;
    if(add>0){ state.session+=add; dbg('gift +',add,'(per',per,'x',rep,') total',state.session); render(); }
    else dbg('gift had no diamond value', d);
  }
  function onMessage(ev){
    var m; try{ m=JSON.parse(ev.data); }catch(e){ return; }
    dbg('msg', m);
    var name=((m.event||m.type||'')+'').toLowerCase();
    var data=m.data||m;
    if(name.indexOf('gift')>=0) handleGift(data);
  }
  function connect(){
    if(!state.auto){ setStatus('off','手動'); return; }
    try{ if(ws){ ws.onclose=null; ws.close(); } }catch(e){}
    setStatus('wait','接続中…');
    try{ ws=new WebSocket(state.wsUrl); }catch(e){ setStatus('err','URL不正'); return; }
    ws.onopen=function(){ setStatus('on','自動'); dbg('ws open'); };
    ws.onmessage=onMessage;
    ws.onerror=function(){ setStatus('err','エラー'); dbg('ws error'); };
    ws.onclose=function(){ setStatus('err','切断'); if(state.auto){ clearTimeout(retry); retry=setTimeout(connect,4000); } };
  }

  window.TLO={
    setCurrent:function(n){ state.auto=false; state.manualCurrent=Number(n)||0; render(); },
    addDiamonds:function(n){ state.session+=Number(n)||0; render(); },
    setState:function(p){ for(var k in (p||{})) state[k]=p[k]; render(); }
  };
  window.addEventListener('message',function(e){ var d=e.data||{};
    if(d.type==='tlo:current') window.TLO.setCurrent(d.value);
    if(d.type==='tlo:add') window.TLO.addDiamonds(d.value); });

  function fromURL(){
    var p=new URLSearchParams(location.search);
    function num(k,t){ if(p.has(k)) state[t]=Number(p.get(k))||0; }
    if(p.has('league')) state.league=p.get('league');
    num('frag','frag'); num('shield','shield'); num('keep','keep'); num('up1','up1'); num('up2','up2');
    num('base','base'); num('current','manualCurrent');
    if(p.has('auto')) state.auto=p.get('auto')!=='0';
    if(p.has('ws')) state.wsUrl=p.get('ws');
    if(p.has('debug')) state.debug=p.get('debug')==='1';
  }
  function toURL(){
    var p=new URLSearchParams();
    p.set('league',state.league); p.set('frag',state.frag); p.set('shield',state.shield);
    p.set('keep',state.keep); p.set('up1',state.up1); p.set('up2',state.up2);
    p.set('auto',state.auto?1:0); p.set('base',state.base); p.set('ws',state.wsUrl);
    if(!state.auto) p.set('current',state.manualCurrent);
    return location.origin+location.pathname+'?'+p.toString();
  }
  function syncPanel(){
    $('i_league').value=state.league; $('i_frag').value=state.frag; $('i_shield').value=state.shield;
    $('i_keep').value=state.keep; $('i_up1').value=state.up1; $('i_up2').value=state.up2;
    $('i_auto').checked=state.auto; $('i_wsurl').value=state.wsUrl; $('i_base').value=state.base;
    $('i_current').value=state.manualCurrent; $('i_debug').checked=state.debug;
    $('urlOut').textContent=toURL();
  }

  $('gear').onclick=function(){ $('panel').classList.toggle('open'); };
  $('applyBtn').onclick=function(){
    state.league=$('i_league').value||'C3'; state.frag=+$('i_frag').value; state.shield=+$('i_shield').value;
    state.keep=+$('i_keep').value; state.up1=+$('i_up1').value; state.up2=+$('i_up2').value;
    var wasAuto=state.auto, oldUrl=state.wsUrl;
    state.auto=$('i_auto').checked; state.wsUrl=$('i_wsurl').value||'ws://localhost:21213/';
    state.base=+$('i_base').value; state.manualCurrent=+$('i_current').value; state.debug=$('i_debug').checked;
    syncPanel(); render();
    if(state.auto && (!wasAuto || oldUrl!==state.wsUrl)) connect();
    if(!state.auto){ try{ ws&&ws.close(); }catch(e){} setStatus('off','手動'); }
  };
  $('reconnBtn').onclick=connect;
  $('resetBtn').onclick=function(){ state.session=0; render(); };
  $('copyBtn').onclick=function(){ if(navigator.clipboard) navigator.clipboard.writeText(toURL()); $('copyBtn').textContent='✓ コピー済'; setTimeout(function(){ $('copyBtn').textContent='🔗 URLコピー'; },1500); };
  var demo=null;
  $('demoBtn').onclick=function(){ if(demo){ clearInterval(demo); demo=null; $('demoBtn').textContent='▶ デモ加算'; return; }
    $('demoBtn').textContent='⏸ 停止'; demo=setInterval(function(){ state.session+=Math.round(1000+Math.random()*4000); if(!state.auto) state.manualCurrent+=2000; render(); },900); };

  fromURL(); syncPanel(); render(); connect();
})();
</script>
</body>
</html>
